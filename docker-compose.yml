version: '3.8'

# =============================================================================
# Flowgate Automation — Docker Compose
# =============================================================================
# Production-grade infrastructure for n8n with:
#  - Fixed image version (no :latest)
#  - Healthchecks with retry logic
#  - Resource limits (CPU + memory)
#  - Log rotation (prevents disk exhaustion)
#  - Persistent named volume
#  - Isolated bridge network
# =============================================================================

services:
  n8n:
    image: n8nio/n8n:1.94.1
    container_name: flowgate-n8n
    restart: unless-stopped
    ports:
      - '${N8N_PORT:-5678}:5678'
    environment:
      # Authentication
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD is required}
      # Networking
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      # Execution pruning (prevents disk bloat)
      - EXECUTIONS_DATA_PRUNE=${EXECUTIONS_DATA_PRUNE:-true}
      - EXECUTIONS_DATA_MAX_AGE=${EXECUTIONS_DATA_MAX_AGE:-168}
      # Observability
      - N8N_METRICS=${N8N_METRICS:-true}
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=${N8N_METRICS_INCLUDE_DEFAULT_METRICS:-true}
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      # External endpoints
      - USERS_API_URL=${USERS_API_URL:-https://jsonplaceholder.typicode.com/users}
      - CRM_WEBHOOK_URL=${CRM_WEBHOOK_URL:-}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_network
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5678/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  n8n_data:
    name: flowgate_n8n_data
    driver: local

networks:
  n8n_network:
    name: flowgate_network
    driver: bridge
