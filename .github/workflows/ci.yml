name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  n8n-validate:
    name: Validar Workflow n8n
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar sintaxe JSON do workflow
        run: |
          node -e "
            const fs = require('fs');
            const flow = JSON.parse(fs.readFileSync('workflows/workflow_boavista.json', 'utf-8'));
            console.log('Nome:', flow.name);
            console.log('Nós:', flow.nodes.length);
            console.log('Conexões:', Object.keys(flow.connections).length);

            const required = ['name', 'nodes', 'connections', 'settings'];
            for (const key of required) {
              if (!flow[key]) throw new Error('Campo obrigatório ausente: ' + key);
            }
            if (flow.nodes.length < 5) throw new Error('Workflow deve ter pelo menos 5 nós');
            if (!flow.connections) throw new Error('Workflow sem conexões');
            console.log('Workflow JSON válido.');
          "

  docker-validate:
    name: Validar Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar docker-compose.yml
        run: docker compose -f docker-compose.yml config

      - name: Validar healthcheck configurado
        run: |
          docker compose -f docker-compose.yml config | grep -q "healthcheck"
          echo "Healthcheck presente no compose."

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: docker-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar .env para teste
        run: |
          cp .env.example .env
          echo "N8N_BASIC_AUTH_PASSWORD=test123" >> .env

      - name: Subir serviços
        run: docker compose up -d

      - name: Aguardar healthcheck
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5678/healthz > /dev/null 2>&1; then
              echo "n8n pronto em ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Timeout: n8n não iniciou"
          exit 1

      - name: Smoke test
        run: bash scripts/smoke-test.sh
